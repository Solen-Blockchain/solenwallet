name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solen-wallet-${{ matrix.rust_target }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" \) | sort | while read f; do
            sha256sum "$f"
          done | tee ../checksums.txt
          # Also create a formatted version for the release body
          echo '## SHA-256 Checksums' > ../checksums.md
          echo '```' >> ../checksums.md
          cat ../checksums.txt >> ../checksums.md
          echo '```' >> ../checksums.md
          echo '' >> ../checksums.md
          echo '## Verify' >> ../checksums.md
          echo 'After downloading, verify the checksum:' >> ../checksums.md
          echo '```bash' >> ../checksums.md
          echo '# Linux/macOS' >> ../checksums.md
          echo 'sha256sum Solen_Wallet_*.AppImage' >> ../checksums.md
          echo '# macOS alternative' >> ../checksums.md
          echo 'shasum -a 256 Solen_Wallet_*.dmg' >> ../checksums.md
          echo '# Windows (PowerShell)' >> ../checksums.md
          echo 'Get-FileHash .\Solen_Wallet_*-setup.exe -Algorithm SHA256' >> ../checksums.md
          echo '```' >> ../checksums.md
          echo '' >> ../checksums.md
          echo '## macOS Note' >> ../checksums.md
          echo '' >> ../checksums.md
          echo 'macOS may show **"Solen Wallet is damaged and can'\''t be opened"** because the app is not yet notarized with Apple. This is a Gatekeeper restriction, not an actual issue with the app.' >> ../checksums.md
          echo '' >> ../checksums.md
          echo 'To fix, run this in Terminal after installing:' >> ../checksums.md
          echo '' >> ../checksums.md
          echo '```bash' >> ../checksums.md
          echo 'xattr -cr /Applications/Solen\ Wallet.app' >> ../checksums.md
          echo '```' >> ../checksums.md
          echo '' >> ../checksums.md
          echo 'Then open the app normally. This only needs to be done once. We are working on Apple notarization for future releases.' >> ../checksums.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: checksums.md
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
            artifacts/**/*.exe
            checksums.txt
